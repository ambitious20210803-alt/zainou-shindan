<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>財脳タイプ診断 ｜ 財脳覚醒ラボ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b1026'/%3E%3Ctext y='72' x='50' font-size='60' text-anchor='middle'%3E%F0%9F%A6%89%3C/text%3E%3C/svg%3E">
<meta name="description" content="8つの動物タイプであなたの“お金との付き合い方”がわかる。財脳覚醒ラボ公式・無料診断。">
<meta property="og:title" content="財脳タイプ診断｜あなたは何の動物？">
<meta property="og:description" content="あなたの財運の状態と、豊かになる方法がわかる無料診断。">
<style>
:root{
  --navy:#0b1026; --navy2:#141b3d; --gold:#f2c84b; --gold2:#e0a83a;
  --txt:#eef1ff; --sub:#aab2d8; --card:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:radial-gradient(120% 80% at 50% -10%, #1c2550 0%, var(--navy) 55%, #070a1c 100%);
  color:var(--txt); line-height:1.7; overflow-x:hidden;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:24px 20px 60px;min-height:100%;}
.screen{display:none;animation:fade .5s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes pop{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}

/* ---- TOP ---- */
.brand{text-align:center;font-size:13px;letter-spacing:.25em;color:var(--gold);margin-top:18px;}
.hero{text-align:center;margin-top:30px;}
.hero h1{font-size:30px;font-weight:800;letter-spacing:.04em;line-height:1.4;}
.hero h1 .em{color:var(--gold);}
.hero p{color:var(--sub);margin-top:18px;font-size:15px;}
.animals-row{display:flex;justify-content:center;gap:6px;margin:34px 0 10px;flex-wrap:wrap;}
.animals-row img{width:58px;height:58px;border-radius:50%;border:1px solid var(--line);object-fit:cover;box-shadow:0 4px 18px rgba(0,0,0,.4);}
.btn{
  display:block;width:100%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#2a1d00;
  font-size:18px;font-weight:800;letter-spacing:.05em;padding:18px;border-radius:16px;
  box-shadow:0 8px 24px rgba(242,200,75,.32);transition:transform .15s, box-shadow .15s;margin-top:26px;
}
.btn:active{transform:scale(.97);}
.btn.line{background:linear-gradient(135deg,#06C755,#04a548);color:#fff;box-shadow:0 8px 24px rgba(6,199,85,.35);}
.btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--line);box-shadow:none;font-weight:600;font-size:15px;}
.note{text-align:center;color:var(--sub);font-size:12px;margin-top:16px;}

/* ---- QUESTION ---- */
.qhead{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.qcount{font-size:13px;color:var(--gold);letter-spacing:.1em;font-weight:700;}
.bar{height:6px;background:rgba(255,255,255,.1);border-radius:99px;margin:14px 0 28px;overflow:hidden;}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;transition:width .4s ease;}
.qtext{font-size:20px;font-weight:800;line-height:1.55;min-height:84px;}
.choices{margin-top:22px;display:flex;flex-direction:column;gap:13px;}
.choice{
  background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 18px;
  font-size:15.5px;font-weight:600;cursor:pointer;transition:all .15s;text-align:left;color:var(--txt);
}
.choice:active{transform:scale(.98);}
.choice:hover{border-color:var(--gold);background:rgba(242,200,75,.08);}
.back{margin-top:26px;text-align:center;}
.back button{background:none;border:none;color:var(--sub);font-size:13px;cursor:pointer;text-decoration:underline;}

/* ---- LOADING ---- */
.loadwrap{text-align:center;padding-top:80px;}
.spinner{width:64px;height:64px;margin:0 auto 28px;border-radius:50%;
  border:4px solid rgba(242,200,75,.2);border-top-color:var(--gold);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loadwrap p{color:var(--sub);font-size:15px;}

/* ---- RESULT ---- */
.r-state{text-align:center;margin-top:10px;}
.r-state img{width:88px;height:88px;border-radius:50%;border:1px solid var(--line);object-fit:cover;animation:pop .6s ease;}
.r-state .slabel{display:inline-block;margin-top:12px;font-size:13px;letter-spacing:.15em;color:var(--gold);
  border:1px solid var(--gold);border-radius:99px;padding:5px 16px;}
.r-animal{text-align:center;margin-top:22px;animation:pop .7s ease;}
.r-animal img{width:200px;height:200px;border-radius:24px;object-fit:cover;border:1px solid var(--line);
  box-shadow:0 12px 40px rgba(0,0,0,.5);}
.r-animal .you{color:var(--sub);font-size:14px;margin-top:18px;}
.r-animal h2{font-size:30px;font-weight:800;margin-top:4px;letter-spacing:.03em;}
.r-animal h2 .e{font-size:26px;}
.r-animal .catch{color:var(--gold);font-size:15px;font-weight:700;margin-top:8px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:24px;}
.card h3{font-size:14px;color:var(--gold);letter-spacing:.1em;margin-bottom:10px;}
.card p{font-size:15px;color:var(--txt);}
.card.method{background:linear-gradient(160deg,rgba(242,200,75,.1),rgba(242,200,75,.02));border-color:rgba(242,200,75,.35);}
.statebox{display:flex;gap:14px;align-items:flex-start;}
.statebox img{width:54px;height:54px;border-radius:12px;flex-shrink:0;object-fit:cover;border:1px solid var(--line);}
.cta-wrap{margin-top:30px;background:linear-gradient(160deg,rgba(6,199,85,.12),rgba(255,255,255,.02));
  border:1px solid rgba(6,199,85,.3);border-radius:18px;padding:24px 22px;text-align:center;}
.cta-wrap h3{font-size:18px;font-weight:800;}
.cta-wrap p{font-size:14px;color:var(--sub);margin-top:10px;}
.foot{text-align:center;color:var(--sub);font-size:11px;margin-top:40px;line-height:1.8;}
.share{margin-top:14px;}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">

  <!-- ===== TOP ===== -->
  <section class="screen active" id="s-top">
    <div class="brand">財 脳 覚 醒 ラ ボ</div>
    <div class="hero">
      <h1>あなたの<span class="em">財脳タイプ</span>は<br>どの動物？</h1>
      <p>14の質問でわかる、あなたの“お金との付き合い方”。<br>そして今の<b style="color:var(--txt)">財運の状態</b>と、豊かになる方法。</p>
    </div>
    <div class="animals-row" id="topAnimals"></div>
    <button class="btn" onclick="start()">診断をはじめる（無料）</button>
    <p class="note">所要時間 約2分 ／ 結果はその場でわかります</p>
  </section>

  <!-- ===== QUESTION ===== -->
  <section class="screen" id="s-q">
    <div class="qhead"><span class="qcount" id="qcount">Q1 / 14</span></div>
    <div class="bar"><i id="bar"></i></div>
    <div class="qtext" id="qtext"></div>
    <div class="choices" id="choices"></div>
    <div class="back"><button onclick="back()" id="backBtn">← 前の質問にもどる</button></div>
  </section>

  <!-- ===== LOADING ===== -->
  <section class="screen" id="s-load">
    <div class="loadwrap">
      <div class="spinner"></div>
      <p id="loadMsg">あなたの財脳を読み解いています…</p>
    </div>
  </section>

  <!-- ===== RESULT ===== -->
  <section class="screen" id="s-result">
    <div class="r-state">
      <img id="rStateImg" alt="">
      <div><span class="slabel" id="rStateLabel"></span></div>
    </div>
    <div class="r-animal">
      <img id="rAnimalImg" alt="">
      <div class="you">あなたの財脳タイプは</div>
      <h2 id="rAnimalName"></h2>
      <div class="catch" id="rCatch"></div>
    </div>

    <div class="card">
      <h3>あなたという人</h3>
      <p id="rBody"></p>
    </div>

    <div class="card">
      <h3>いまの財運の状態</h3>
      <div class="statebox">
        <img id="rStateImg2" alt="">
        <div>
          <p style="font-weight:700;margin-bottom:6px" id="rStateLead"></p>
          <p id="rStateBody" style="font-size:14px;color:var(--sub)"></p>
        </div>
      </div>
    </div>

    <div class="card method">
      <h3>あなたが豊かになる方法</h3>
      <p id="rMethod"></p>
    </div>

    <div class="cta-wrap">
      <h3 id="ctaTitle">財脳覚醒ラボへようこそ</h3>
      <p id="rCta"></p>
      <a class="btn line" id="lineBtn" href="#" target="_blank" rel="noopener">LINEで「財脳覚醒ラボ」に参加する</a>
      <p style="font-size:11px;color:var(--sub);margin-top:12px">無料 ／ いつでも退出できます</p>
    </div>

    <div class="share">
      <button class="btn ghost" onclick="restart()">もう一度診断する</button>
    </div>

    <div class="foot">
      財脳タイプ診断 ｜ 財脳覚醒ラボ<br>
      ※この診断はエンタメ・自己理解を目的としたものです
    </div>
  </section>

</div>

<script src="data.js"></script>
<script>
// ====== ここだけ書き換え：LINEオープンチャットの招待URL ======
const LINE_OPENCHAT_URL = "https://line.me/ti/g2/XXXXXXXXXXXXXXXX";
// ============================================================

const $=id=>document.getElementById(id);
let cur=0, answers=[], locked=false;

// top animals
const topKeys=["owl","deer","dolphin","lion","hawk","elephant","wolf","swan"];
$("topAnimals").innerHTML=topKeys.map(k=>`<img src="${ANIMALS[k].img}" alt="${ANIMALS[k].name}">`).join("");

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0);}
function start(){cur=0;answers=[];locked=false;show('s-q');render();}
function restart(){show('s-top');}

function render(){
  locked=false;
  const Q=QUESTIONS[cur];
  $("qcount").textContent=`Q${cur+1} / ${QUESTIONS.length}`;
  $("bar").style.width=((cur)/QUESTIONS.length*100)+"%";
  $("qtext").textContent=Q.q;
  $("backBtn").style.visibility = cur===0 ? "hidden":"visible";
  $("choices").innerHTML="";
  Q.choices.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="choice";b.textContent=c.label;
    b.onclick=()=>choose(i);
    $("choices").appendChild(b);
  });
}
function choose(i){
  if(locked)return;          // 連打・多重進行ガード
  locked=true;
  answers[cur]=i;
  if(cur<QUESTIONS.length-1){cur++;render();}
  else finish();
}
function back(){if(locked)return;if(cur>0){cur--;render();}}

function finish(){
  $("bar").style.width="100%";
  show('s-load');
  const msgs=["あなたの財脳を読み解いています…","8つの動物の中から探しています…","財運の状態を確かめています…"];
  let mi=0;const t=setInterval(()=>{mi=(mi+1)%msgs.length;$("loadMsg").textContent=msgs[mi];},900);
  setTimeout(()=>{clearInterval(t);renderResult(diagnose(answers));},2600);
}

function renderResult(r){
  const a=r.animal, s=r.state;
  $("rStateImg").src=s.img; $("rStateImg2").src=s.img;
  $("rStateLabel").textContent="財運：" + s.name;
  $("rAnimalImg").src=a.img;
  $("rAnimalName").innerHTML=`<span class="e">${a.emoji}</span> ${a.name}`;
  $("rCatch").textContent=a.catch;
  $("rBody").textContent=a.body;
  $("rStateLead").textContent=s.lead;
  $("rStateBody").textContent=s.body;
  $("rMethod").textContent=a.method;
  $("rCta").textContent=s.cta;
  $("lineBtn").href=LINE_OPENCHAT_URL;
  show('s-result');
}

// starfield
(function(){
  const c=$("stars"),x=c.getContext("2d");let w,h,st=[];
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight;st=[];const n=Math.min(110,Math.floor(w*h/12000));for(let i=0;i<n;i++)st.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.3+.2,o:Math.random(),s:Math.random()*.02+.004});}
  function draw(){x.clearRect(0,0,w,h);st.forEach(p=>{p.o+=p.s;let o=Math.abs(Math.sin(p.o));x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fillStyle=`rgba(255,240,200,${o*.8})`;x.fill();});requestAnimationFrame(draw);}
  rs();draw();addEventListener("resize",rs);
})();
</script>
</body>
</html>
